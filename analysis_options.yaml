# Lints: Very Good Analysis + strict language modes.
# Rationale: doc/adr/0002-lint-ruleset.md
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - test/fixtures/**

linter:
  rules:
    # copyWith uses a sentinel default for the nullable `omm` argument, so
    # passing explicit values there is intentional rather than redundant.
    avoid_redundant_argument_values: false
    # Enforce dartdoc on every public member for pub.dev score.
    public_member_api_docs: true
