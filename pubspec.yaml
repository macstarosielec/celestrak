name: celestrak
description: >-
  A pure-Dart client for fetching, parsing, and caching satellite TLE and OMM
  orbital data from CelesTrak and Space-Track. No Flutter dependency.
version: 1.0.5
repository: https://github.com/macstarosielec/celestrak
issue_tracker: https://github.com/macstarosielec/celestrak/issues
homepage: https://github.com/macstarosielec/celestrak

topics:
  - satellite
  - tle
  - omm
  - orbital
  - space

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  web:

environment:
  sdk: ^3.4.0

# All dependency versions are capped so their SDK floor stays <= environment.sdk
# (^3.4.0). A newer dep that requires a higher SDK would silently raise the
# package's supported range, so dev tooling never dictates the SDK floor.
dependencies:
  http: ^1.6.0
  meta: ^1.16.0

dev_dependencies:
  coverage: ^1.15.0
  test: ^1.25.8
  very_good_analysis: ^6.0.0
